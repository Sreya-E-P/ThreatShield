version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: threatshield-postgres
    environment:
      POSTGRES_DB: threatshield
      POSTGRES_USER: threatshield
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeThisInProduction!123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - threatshield-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: threatshield-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-ChangeThisInProduction!123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - threatshield-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: threatshield-backend
    environment:
      DATABASE_URL: postgresql://threatshield:${POSTGRES_PASSWORD:-ChangeThisInProduction!123}@postgres:5432/threatshield
      REDIS_URL: redis://:${REDIS_PASSWORD:-ChangeThisInProduction!123}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-YourSuperSecretKeyChangeInProduction}
      MISP_API_KEY: ${MISP_API_KEY}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY}
      MORALIS_API_KEY: ${MORALIS_API_KEY}
      ALCHEMY_API_KEY: ${ALCHEMY_API_KEY}
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    volumes:
      - ./models:/app/models
      - ./keys:/app/keys
      - ./logs:/app/logs
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - threatshield-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: threatshield-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8001/ws
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - threatshield-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: threatshield-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - threatshield-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: threatshield-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - threatshield-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: threatshield-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - threatshield-network
    restart: unless-stopped

networks:
  threatshield-network:
    driver: bridge
    name: threatshield-network

volumes:
  postgres_data:
    name: threatshield-postgres-data
  redis_data:
    name: threatshield-redis-data
  models:
    name: threatshield-models
  keys:
    name: threatshield-keys
  logs:
    name: threatshield-logs
  prometheus_data:
    name: threatshield-prometheus-data
  grafana_data:
    name: threatshield-grafana-data
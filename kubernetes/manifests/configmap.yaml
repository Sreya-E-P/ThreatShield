apiVersion: v1
kind: ConfigMap
metadata:
  name: threatshield-config
  namespace: threatshield
data:
  settings.yaml: |
    environment: production
    debug: false
    log_level: INFO
    
    database:
      pool_size: 20
      max_overflow: 40
      echo: false
    
    crypto:
      pqc_algorithm: "Kyber1024"
      hybrid_mode: true
      key_cache_size: 1000
      key_rotation_days: 30
    
    ai:
      zero_day_threshold: 0.7
      gnn_hidden_dim: 256
      rl_learning_rate: 0.001
      model_cache_dir: "/app/models"
    
    blockchain:
      polygon_rpc: "https://polygon-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
      ethereum_rpc: "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
      bsc_rpc: "https://bsc-dataseed1.binance.org"
    
    threat_intel:
      update_interval_minutes: 5
    
    security:
      jwt_algorithm: "HS256"
      jwt_expire_minutes: 30
      refresh_token_expire_days: 7
      cors_origins: ["https://threatshield.yourdomain.com"]
    
    redis:
      cache_ttl: 300